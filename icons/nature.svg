        stroke="#C8603A" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.50"/>
  <path d="M24 16 C28 14 33 16 36 19"
        stroke="#C8603A" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.50"/>

  <!-- Lower side veins -->
  <path d="M24 26 C20 24 15 26 13 30"
        stroke="#C8603A" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.50"/>
  <path d="M24 26 C28 24 33 26 35 30"
